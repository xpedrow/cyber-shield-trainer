version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cyber-shield-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cyber_shield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cyber-shield-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber-shield-api
    restart: always
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: cyber_shield
      REDIS_HOST: redis
      JWT_SECRET: your_very_secret_key_here
      PORT: 3001
      FRONTEND_URL: http://localhost # Permite acesso via Nginx
    depends_on:
      - db
      - redis
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api # Usa o proxy do Nginx
    container_name: cyber-shield-web
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: cyber-shield-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:

  postgres_data:
