name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install Frontend Dependencies
      run: npm install

    - name: Lint Frontend
      run: npm run lint

    - name: Build Frontend
      run: npm run build

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install --legacy-peer-deps



    - name: Test Backend
      run: |
        cd backend
        npm test

    - name: Build Backend
      run: |
        cd backend
        npm run build

  docker-build:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false
        tags: cyber-shield-api:latest

    - name: Build Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: cyber-shield-web:latest
